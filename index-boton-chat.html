<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Chatflow HubSpot</title>

<!-- Start of HubSpot Embed Code -->
<script type="text/javascript" id="hs-script-loader" async defer src="//js.hs-scripts.com/50744593.js"></script>
<!-- End of HubSpot Embed Code -->

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial,sans-serif;
            background:#f5f7fa;
        }

        button{
            background:#00BDA5;
            color:white;
            border:none;
            border-radius:8px;
            padding:14px 28px;
            font-size:16px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<button id="chat-soporte">
    Chatear con soporte
</button>

<script>
document.getElementById('chat-soporte').addEventListener('click', function() {

    // Agrega ?chatflow=si sin recargar la página
    const url = new URL(window.location);

    url.searchParams.set('chatflow', 'si');

    window.history.pushState({}, '', url);

    // Intenta abrir el widget
    let attempts = 0;

    const timer = setInterval(function() {

        attempts++;

        if (
            window.HubSpotConversations &&
            window.HubSpotConversations.widget
        ) {
            clearInterval(timer);

            setTimeout(function() {
                window.HubSpotConversations.widget.open();
            }, 1000);
        }

        if (attempts >= 20) {
            clearInterval(timer);
        }

    }, 500);

});
</script>

</body>
</html>
