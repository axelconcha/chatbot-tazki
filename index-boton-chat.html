<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prueba Chatflow HubSpot</title>

<!-- Start of HubSpot Embed Code -->
<script type="text/javascript" id="hs-script-loader" async defer src="//js.hs-scripts.com/50744593.js"></script>
<!-- End of HubSpot Embed Code -->

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: #f5f7fa;
}

button {
  background: #00BDA5;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 14px 28px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<button id="chat-soporte">
  Chatear con soporte
</button>

<script>
function abrirChatflowSoporte() {
  const url = new URL(window.location.href);
  url.searchParams.set("chatflow", "si");

  window.history.pushState({}, "", url);

  function ejecutarHubSpot() {
    if (
      window.HubSpotConversations &&
      window.HubSpotConversations.widget
    ) {
      window.HubSpotConversations.widget.refresh({
        openToNewThread: true
      });

      setTimeout(function () {
        window.HubSpotConversations.widget.open();
      }, 1000);

      return true;
    }

    return false;
  }

  if (ejecutarHubSpot()) return;

  window.hsConversationsOnReady = window.hsConversationsOnReady || [];

  window.hsConversationsOnReady.push(function () {
    ejecutarHubSpot();
  });
}

document
  .getElementById("chat-soporte")
  .addEventListener("click", function (e) {
    e.preventDefault();
    abrirChatflowSoporte();
  });
</script>

</body>
</html>
